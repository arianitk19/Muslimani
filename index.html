/* ============================================================
   VAKTI — Design System
   Platforma islame për Kosovën · BuiltByNiti
   ============================================================ */

/* ---------- Tokens ---------- */
:root {
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-arabic: 'Noto Naskh Arabic', 'Traditional Arabic', 'Geeza Pro', serif;

  --primary: #10b981;
  --primary-2: #34d399;
  --primary-deep: #059669;
  --gold: #f5b942;
  --danger: #f43f5e;
  --info: #38bdf8;

  --grad-primary: linear-gradient(135deg, #10b981 0%, #0d9488 100%);
  --grad-card: linear-gradient(160deg, rgba(16,185,129,.14), rgba(13,148,136,.05));

  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;

  --dur-1: .18s;
  --dur-2: .32s;
  --dur-3: .5s;
  --ease: cubic-bezier(.32,.72,.24,1);
  --spring: cubic-bezier(.34,1.4,.44,1);

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  --content-w: 560px;
  --nav-h: 64px;

  --fs-quran: 1.65rem; /* dynamic via settings */
}

/* Dark (default) */
:root, [data-theme="dark"] {
  color-scheme: dark;
  --bg: #060b14;
  --bg-grad: radial-gradient(1200px 500px at 50% -10%, rgba(16,185,129,.09), transparent 60%);
  --surface: rgba(255,255,255,.045);
  --surface-2: rgba(255,255,255,.08);
  --surface-solid: #0d1524;
  --border: rgba(255,255,255,.09);
  --text: #f3f6fa;
  --text-2: rgba(240,246,252,.62);
  --text-3: rgba(240,246,252,.38);
  --shadow-1: 0 2px 16px rgba(0,0,0,.25);
  --shadow-2: 0 12px 40px rgba(0,0,0,.45);
  --glow: 0 0 24px rgba(16,185,129,.22);
  --scrim: rgba(4,8,15,.7);
}

[data-theme="light"] {
  color-scheme: light;
  --bg: #f4f7f6;
  --bg-grad: radial-gradient(1200px 500px at 50% -10%, rgba(16,185,129,.10), transparent 60%);
  --surface: rgba(255,255,255,.78);
  --surface-2: rgba(255,255,255,.95);
  --surface-solid: #ffffff;
  --border: rgba(10,30,25,.09);
  --text: #0b1622;
  --text-2: rgba(11,22,34,.6);
  --text-3: rgba(11,22,34,.38);
  --shadow-1: 0 2px 14px rgba(15,40,35,.07);
  --shadow-2: 0 14px 44px rgba(15,40,35,.14);
  --glow: 0 0 24px rgba(16,185,129,.14);
  --scrim: rgba(20,32,30,.45);
}

[data-theme="oled"] {
  color-scheme: dark;
  --bg: #000000;
  --bg-grad: none;
  --surface: rgba(255,255,255,.055);
  --surface-2: rgba(255,255,255,.1);
  --surface-solid: #0a0a0a;
  --border: rgba(255,255,255,.1);
  --text: #f5f5f5;
  --text-2: rgba(245,245,245,.6);
  --text-3: rgba(245,245,245,.35);
  --shadow-1: none;
  --shadow-2: 0 12px 40px rgba(0,0,0,.7);
  --glow: 0 0 24px rgba(16,185,129,.25);
  --scrim: rgba(0,0,0,.78);
}

/* ---------- Base ---------- */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font);
  background: var(--bg);
  background-image: var(--bg-grad);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
  transition: background-color var(--dur-2) var(--ease), color var(--dur-2) var(--ease);
}
img, svg, video { display: block; max-width: 100%; }
button, input, select, textarea { font: inherit; color: inherit; }
button { cursor: pointer; background: none; border: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
a { color: var(--primary); text-decoration: none; -webkit-tap-highlight-color: transparent; }
::selection { background: rgba(16,185,129,.32); }
:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 6px; }
h1,h2,h3,h4 { margin: 0; letter-spacing: -.02em; }
p { margin: 0; }
[hidden] { display: none !important; }

/* ---------- App layout ---------- */
#app {
  max-width: var(--content-w);
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
}
.page {
  flex: 1;
  padding: calc(var(--safe-top) + 14px) 18px calc(var(--nav-h) + var(--safe-bottom) + 28px);
  animation: page-in var(--dur-3) var(--ease) both;
}
@keyframes page-in {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: none; }
}
.page.leaving { animation: page-out var(--dur-1) var(--ease) both; }
@keyframes page-out { to { opacity: 0; transform: translateY(-8px); } }

/* ---------- Header ---------- */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 18px;
}
.app-header .brand { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.app-header .brand h1 { font-size: 1.35rem; font-weight: 800; }
.app-header .brand .sub { font-size: .78rem; color: var(--text-2); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.icon-btn {
  width: 42px; height: 42px; border-radius: 14px;
  display: grid; place-items: center;
  background: var(--surface); border: 1px solid var(--border);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  color: var(--text-2);
  transition: transform var(--dur-1) var(--spring), background var(--dur-1), color var(--dur-1);
}
.icon-btn:active { transform: scale(.9); }
.icon-btn svg { width: 20px; height: 20px; }
.avatar-btn {
  width: 42px; height: 42px; border-radius: 14px; overflow: hidden;
  background: var(--grad-primary); color: #fff;
  display: grid; place-items: center; font-weight: 800; font-size: .95rem;
  border: 1px solid var(--border);
  transition: transform var(--dur-1) var(--spring);
}
.avatar-btn:active { transform: scale(.9); }

/* Page header (inner pages) */
.page-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.page-head h2 { font-size: 1.3rem; font-weight: 800; flex: 1; }
.back-btn { composes: icon-btn; }

/* ---------- Cards ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px;
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  box-shadow: var(--shadow-1);
  transition: transform var(--dur-1) var(--spring), box-shadow var(--dur-2), background var(--dur-2), border-color var(--dur-2);
}
.card.pressable:active { transform: scale(.975); }
.card + .card { margin-top: 14px; }

.section { margin-top: 26px; }
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
.section-head h3 { font-size: 1.02rem; font-weight: 800; }
.section-head .link { font-size: .82rem; font-weight: 700; color: var(--primary); background: none; }

/* Hero prayer card */
.hero-card {
  position: relative; overflow: hidden;
  border-radius: var(--r-xl);
  padding: 26px 22px;
  background: var(--grad-card), var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow-2), var(--glow);
}
.hero-card::before {
  content: ''; position: absolute; inset: -40% -20% auto auto;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(16,185,129,.22), transparent 65%);
  pointer-events: none;
}
.hero-label { font-size: .78rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--primary-2); }
.hero-prayer { font-size: 2.5rem; font-weight: 800; letter-spacing: -.03em; margin: 6px 0 2px; }
.hero-time { font-size: 1.05rem; color: var(--text-2); font-weight: 600; }
.hero-count {
  font-variant-numeric: tabular-nums;
  font-size: 2rem; font-weight: 800; color: var(--primary-2);
  letter-spacing: .02em;
}
.hero-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-top: 18px; }
.hero-count-label { font-size: .74rem; color: var(--text-3); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }

/* progress bar */
.pbar { height: 6px; border-radius: 99px; background: var(--surface-2); overflow: hidden; margin-top: 18px; }
.pbar > i { display: block; height: 100%; border-radius: 99px; background: var(--grad-primary); transition: width 1s linear; }

/* ---------- Prayer timeline list ---------- */
.prayer-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; border-radius: var(--r-md);
  background: var(--surface); border: 1px solid var(--border);
  transition: all var(--dur-2) var(--ease);
}
.prayer-row + .prayer-row { margin-top: 10px; }
.prayer-row .p-icon {
  width: 40px; height: 40px; border-radius: 13px; display: grid; place-items: center;
  background: var(--surface-2); color: var(--text-2); flex-shrink: 0;
}
.prayer-row .p-icon svg { width: 20px; height: 20px; }
.prayer-row .p-name { font-weight: 700; flex: 1; }
.prayer-row .p-time { font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text-2); }
.prayer-row.done { opacity: .55; }
.prayer-row.active {
  background: var(--grad-card), var(--surface);
  border-color: rgba(16,185,129,.4);
  box-shadow: var(--glow);
}
.prayer-row.active .p-icon { background: var(--grad-primary); color: #fff; }
.prayer-row.active .p-time { color: var(--primary-2); }
.p-check {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--border); display: grid; place-items: center;
  color: transparent; transition: all var(--dur-1) var(--spring);
  flex-shrink: 0;
}
.p-check svg { width: 14px; height: 14px; }
.p-check.on { background: var(--grad-primary); border-color: transparent; color: #fff; transform: scale(1.05); }

/* ---------- Quick actions grid ---------- */
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.quick {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 14px 6px; border-radius: var(--r-md);
  background: var(--surface); border: 1px solid var(--border);
  transition: transform var(--dur-1) var(--spring), background var(--dur-1);
}
.quick:active { transform: scale(.92); }
.quick .q-icon {
  width: 44px; height: 44px; border-radius: 15px;
  display: grid; place-items: center; color: #fff;
  background: var(--grad-primary);
  box-shadow: 0 6px 16px rgba(16,185,129,.3);
}
.quick .q-icon svg { width: 21px; height: 21px; }
.quick span { font-size: .72rem; font-weight: 700; color: var(--text-2); }

/* ---------- Daily content card ---------- */
.daily-card { position: relative; }
.daily-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: .72rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
  color: var(--primary-2); margin-bottom: 10px;
}
.daily-ar {
  font-family: var(--font-arabic);
  font-size: 1.5rem; line-height: 2; direction: rtl; text-align: right;
  margin-bottom: 10px;
}
.daily-sq { color: var(--text-2); line-height: 1.65; font-size: .95rem; }
.daily-src { margin-top: 10px; font-size: .78rem; font-weight: 700; color: var(--text-3); }

/* ---------- Chips ---------- */
.chips { display: flex; gap: 8px; overflow-x: auto; padding: 2px; margin: 0 -2px 14px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 8px 15px; border-radius: 99px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: .82rem; font-weight: 700; color: var(--text-2);
  transition: all var(--dur-1) var(--ease);
}
.chip.on { background: var(--grad-primary); color: #fff; border-color: transparent; box-shadow: 0 4px 14px rgba(16,185,129,.35); }
.chip:active { transform: scale(.94); }

/* ---------- List items ---------- */
.list-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; border-radius: var(--r-md);
  background: var(--surface); border: 1px solid var(--border);
  transition: transform var(--dur-1) var(--spring);
  width: 100%; text-align: left;
}
.list-item:active { transform: scale(.975); }
.list-item + .list-item { margin-top: 10px; }
.li-icon {
  width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
  display: grid; place-items: center;
  background: var(--surface-2); color: var(--primary);
}
.li-icon svg { width: 20px; height: 20px; }
.li-body { flex: 1; min-width: 0; }
.li-title { font-weight: 700; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: .8rem; color: var(--text-3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-end { color: var(--text-3); font-size: .8rem; font-weight: 700; flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
.li-end svg { width: 16px; height: 16px; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 22px; border-radius: 16px;
  font-weight: 800; font-size: .95rem;
  background: var(--surface-2); color: var(--text);
  border: 1px solid var(--border);
  transition: transform var(--dur-1) var(--spring), box-shadow var(--dur-1), opacity var(--dur-1);
  width: 100%;
}
.btn:active { transform: scale(.96); }
.btn svg { width: 18px; height: 18px; }
.btn-primary {
  background: var(--grad-primary); color: #fff; border: 0;
  box-shadow: 0 8px 24px rgba(16,185,129,.35);
}
.btn-ghost { background: transparent; border: 0; color: var(--primary); width: auto; padding: 10px 14px; }
.btn-sm { padding: 9px 16px; font-size: .82rem; border-radius: 12px; width: auto; }
.btn:disabled { opacity: .5; pointer-events: none; }

/* ---------- Inputs ---------- */
.input, select.input {
  width: 100%; padding: 14px 16px; border-radius: 16px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-weight: 600;
  transition: border-color var(--dur-1);
  appearance: none; -webkit-appearance: none;
}
.input::placeholder { color: var(--text-3); }
.input:focus { outline: none; border-color: var(--primary); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: .8rem; font-weight: 800; color: var(--text-2); margin-bottom: 8px; }
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap svg { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--text-3); pointer-events: none; }
.search-wrap .input { padding-left: 44px; }

/* toggle switch */
.switch { position: relative; width: 50px; height: 30px; flex-shrink: 0; }
.switch input { opacity: 0; width: 100%; height: 100%; position: absolute; margin: 0; cursor: pointer; z-index: 1; }
.switch i {
  position: absolute; inset: 0; border-radius: 99px;
  background: var(--surface-2); border: 1px solid var(--border);
  transition: background var(--dur-2) var(--ease);
}
.switch i::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 22px; height: 22px; border-radius: 50%; background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
  transition: transform var(--dur-2) var(--spring);
}
.switch input:checked + i { background: var(--primary); border-color: transparent; }
.switch input:checked + i::after { transform: translateX(20px); }

/* settings row */
.set-row {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 16px; width: 100%; text-align: left;
  background: var(--surface); border: 1px solid var(--border);
  transition: background var(--dur-1);
}
.set-group { border-radius: var(--r-lg); overflow: hidden; }
.set-group .set-row { border-radius: 0; border-bottom-width: 0; }
.set-group .set-row:first-child { border-radius: var(--r-lg) var(--r-lg) 0 0; }
.set-group .set-row:last-child { border-radius: 0 0 var(--r-lg) var(--r-lg); border-bottom-width: 1px; }
.set-group .set-row:only-child { border-radius: var(--r-lg); }

/* ---------- Tab bar ---------- */
.tab-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: var(--content-w);
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  display: flex;
  background: color-mix(in srgb, var(--surface-solid) 82%, transparent);
  backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%);
  border-top: 1px solid var(--border);
  z-index: 100;
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; color: var(--text-3); position: relative;
  transition: color var(--dur-1);
}
.tab svg { width: 23px; height: 23px; transition: transform var(--dur-1) var(--spring); }
.tab span { font-size: .64rem; font-weight: 800; letter-spacing: .02em; }
.tab.on { color: var(--primary); }
.tab.on svg { transform: translateY(-2px) scale(1.08); }
.tab.on::before {
  content: ''; position: absolute; top: 0; width: 32px; height: 3px;
  border-radius: 0 0 4px 4px; background: var(--grad-primary);
}

/* ---------- Sheet (bottom modal) ---------- */
.sheet-scrim {
  position: fixed; inset: 0; background: var(--scrim); z-index: 200;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  animation: fade-in var(--dur-2) var(--ease);
}
@keyframes fade-in { from { opacity: 0; } }
.sheet {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: var(--content-w);
  max-height: 88dvh; overflow-y: auto;
  background: var(--surface-solid);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  border: 1px solid var(--border); border-bottom: 0;
  padding: 10px 20px calc(24px + var(--safe-bottom));
  z-index: 201;
  animation: sheet-up var(--dur-3) var(--spring);
}
@keyframes sheet-up { from { transform: translate(-50%, 100%); } }
.sheet.closing { animation: sheet-down var(--dur-2) var(--ease) forwards; }
.sheet-scrim.closing { animation: fade-out var(--dur-2) var(--ease) forwards; }
@keyframes sheet-down { to { transform: translate(-50%, 105%); } }
@keyframes fade-out { to { opacity: 0; } }
.sheet-handle { width: 40px; height: 4px; border-radius: 99px; background: var(--border); margin: 6px auto 16px; }
.sheet h3 { font-size: 1.15rem; font-weight: 800; margin-bottom: 14px; }

/* ---------- Toast ---------- */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
  left: 50%; transform: translateX(-50%);
  padding: 12px 20px; border-radius: 16px;
  background: var(--surface-solid); border: 1px solid var(--border);
  box-shadow: var(--shadow-2);
  font-weight: 700; font-size: .88rem; color: var(--text);
  z-index: 300; display: flex; align-items: center; gap: 10px;
  animation: toast-in var(--dur-3) var(--spring), fade-out var(--dur-2) var(--ease) 2.4s forwards;
  max-width: calc(100% - 40px); white-space: nowrap;
}
.toast svg { width: 18px; height: 18px; color: var(--primary); flex-shrink: 0; }
@keyframes toast-in { from { transform: translate(-50%, 30px); opacity: 0; } }

/* ---------- Skeleton ---------- */
.skeleton {
  border-radius: var(--r-md);
  background: var(--surface);
  position: relative; overflow: hidden;
}
.skeleton::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, var(--surface-2), transparent);
  animation: shimmer 1.4s infinite;
  transform: translateX(-100%);
}
@keyframes shimmer { to { transform: translateX(100%); } }

/* ---------- Quran reader ---------- */
.ayah-card { padding: 18px; border-radius: var(--r-lg); background: var(--surface); border: 1px solid var(--border); }
.ayah-card + .ayah-card { margin-top: 12px; }
.ayah-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.ayah-num {
  width: 34px; height: 34px; border-radius: 12px;
  display: grid; place-items: center;
  background: var(--surface-2); color: var(--primary);
  font-weight: 800; font-size: .78rem;
}
.ayah-actions { display: flex; gap: 4px; }
.ayah-actions button { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; color: var(--text-3); transition: color var(--dur-1), transform var(--dur-1) var(--spring); }
.ayah-actions button:active { transform: scale(.85); }
.ayah-actions button.on { color: var(--gold); }
.ayah-actions svg { width: 17px; height: 17px; }
.ayah-ar { font-family: var(--font-arabic); font-size: var(--fs-quran); line-height: 2.1; direction: rtl; text-align: right; }
.ayah-sq { margin-top: 12px; color: var(--text-2); line-height: 1.7; font-size: .93rem; }
.ayah-card.highlight { border-color: rgba(16,185,129,.5); box-shadow: var(--glow); }

.surah-head {
  text-align: center; padding: 26px 18px; border-radius: var(--r-xl);
  background: var(--grad-card), var(--surface); border: 1px solid var(--border);
  margin-bottom: 16px;
}
.surah-head .s-ar { font-family: var(--font-arabic); font-size: 2rem; color: var(--primary-2); }
.surah-head .s-name { font-size: 1.25rem; font-weight: 800; margin-top: 4px; }
.surah-head .s-meta { font-size: .8rem; color: var(--text-3); font-weight: 700; margin-top: 6px; }
.bismillah { font-family: var(--font-arabic); font-size: 1.5rem; text-align: center; margin: 18px 0; color: var(--text-2); }

/* ---------- Kibla compass ---------- */
.compass-wrap { display: grid; place-items: center; padding: 30px 0 10px; }
.compass {
  width: min(78vw, 320px); height: min(78vw, 320px);
  position: relative; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  box-shadow: var(--shadow-2), inset 0 0 60px rgba(16,185,129,.05);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
}
.compass-dial { position: absolute; inset: 0; transition: transform .12s linear; will-change: transform; }
.kaaba-marker {
  position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
  display: grid; place-items: center;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--grad-primary); color: #fff;
  box-shadow: 0 4px 18px rgba(16,185,129,.5);
  font-size: 1.2rem;
}
.compass-needle {
  position: absolute; top: 50%; left: 50%;
  width: 4px; height: 42%; transform-origin: 50% 0;
  transform: translate(-50%, -100%);
}
.compass-center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.compass-center .deg { font-size: 2.2rem; font-weight: 800; font-variant-numeric: tabular-nums; }
.compass-center .lbl { font-size: .72rem; font-weight: 800; letter-spacing: .1em; color: var(--text-3); text-transform: uppercase; }
.compass.aligned { border-color: rgba(16,185,129,.6); box-shadow: var(--glow), var(--shadow-2); }

/* ---------- Calendar ---------- */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-dow { text-align: center; font-size: .68rem; font-weight: 800; color: var(--text-3); padding: 6px 0; text-transform: uppercase; }
.cal-day {
  aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1px;
  font-size: .88rem; font-weight: 700;
  transition: background var(--dur-1);
  position: relative;
}
.cal-day .hij { font-size: .58rem; color: var(--text-3); font-weight: 700; }
.cal-day.other { opacity: .25; }
.cal-day.today { background: var(--grad-primary); color: #fff; box-shadow: 0 4px 14px rgba(16,185,129,.4); }
.cal-day.today .hij { color: rgba(255,255,255,.75); }
.cal-day.event::after {
  content: ''; position: absolute; bottom: 5px;
  width: 5px; height: 5px; border-radius: 50%; background: var(--gold);
}
.cal-day.today.event::after { background: #fff; }

/* ---------- Video card ---------- */
.video-card {
  border-radius: var(--r-lg); overflow: hidden;
  background: var(--surface); border: 1px solid var(--border);
  transition: transform var(--dur-1) var(--spring);
  width: 100%; text-align: left;
}
.video-card:active { transform: scale(.975); }
.video-card + .video-card { margin-top: 14px; }
.video-thumb { position: relative; aspect-ratio: 16/9; background: var(--surface-2); }
.video-thumb img { width: 100%; height: 100%; object-fit: cover; }
.video-thumb .play {
  position: absolute; inset: 0; display: grid; place-items: center;
}
.video-thumb .play i {
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(6,11,20,.55); backdrop-filter: blur(8px);
  display: grid; place-items: center; color: #fff;
  border: 1px solid rgba(255,255,255,.25);
  transition: transform var(--dur-1) var(--spring);
}
.video-card:active .play i { transform: scale(1.1); }
.video-thumb .play svg { width: 20px; height: 20px; margin-left: 3px; }
.video-body { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.video-body .li-body { flex: 1; }
.video-frame { aspect-ratio: 16/9; border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border); margin-bottom: 16px; }
.video-frame iframe { width: 100%; height: 100%; border: 0; display: block; }

/* ---------- Stats / profile ---------- */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat {
  padding: 16px 10px; border-radius: var(--r-md); text-align: center;
  background: var(--surface); border: 1px solid var(--border);
}
.stat .v { font-size: 1.5rem; font-weight: 800; color: var(--primary-2); }
.stat .k { font-size: .68rem; font-weight: 800; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }
.profile-hero { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 24px 0 8px; }
.profile-avatar {
  width: 92px; height: 92px; border-radius: 30px;
  background: var(--grad-primary); color: #fff;
  display: grid; place-items: center; font-size: 2.2rem; font-weight: 800;
  box-shadow: 0 12px 32px rgba(16,185,129,.4);
  margin-bottom: 14px;
}
.badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.badge {
  padding: 16px 8px; border-radius: var(--r-md); text-align: center;
  background: var(--surface); border: 1px solid var(--border);
  opacity: .38; filter: grayscale(.8);
  transition: all var(--dur-2);
}
.badge.earned { opacity: 1; filter: none; border-color: rgba(245,185,66,.35); box-shadow: 0 0 20px rgba(245,185,66,.12); }
.badge .b-icon { font-size: 1.7rem; }
.badge .b-name { font-size: .68rem; font-weight: 800; margin-top: 6px; }

/* ---------- Onboarding ---------- */
.onboard {
  position: fixed; inset: 0; z-index: 500;
  background: var(--bg); background-image: var(--bg-grad);
  display: flex; flex-direction: column;
  max-width: var(--content-w); margin: 0 auto;
  padding: calc(var(--safe-top) + 30px) 26px calc(var(--safe-bottom) + 26px);
}
.onboard-body { flex: 1; display: flex; flex-direction: column; justify-content: center; animation: page-in var(--dur-3) var(--ease); }
.onboard-logo {
  width: 84px; height: 84px; border-radius: 26px;
  background: var(--grad-primary); display: grid; place-items: center;
  box-shadow: 0 16px 40px rgba(16,185,129,.45);
  margin-bottom: 26px;
}
.onboard-logo svg { width: 44px; height: 44px; color: #fff; }
.onboard h1 { font-size: 2rem; font-weight: 800; letter-spacing: -.03em; line-height: 1.15; }
.onboard .lead { color: var(--text-2); margin-top: 12px; line-height: 1.65; }
.onboard-dots { display: flex; gap: 6px; margin-bottom: 24px; }
.onboard-dots i { width: 8px; height: 8px; border-radius: 99px; background: var(--surface-2); transition: all var(--dur-2) var(--ease); }
.onboard-dots i.on { width: 24px; background: var(--primary); }
.opt-list { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; max-height: 46dvh; overflow-y: auto; padding: 2px; }
.opt {
  padding: 16px 18px; border-radius: var(--r-md);
  background: var(--surface); border: 1.5px solid var(--border);
  font-weight: 700; text-align: left; display: flex; align-items: center; gap: 12px;
  transition: all var(--dur-1) var(--ease);
}
.opt.on { border-color: var(--primary); background: var(--grad-card), var(--surface); }
.opt .o-check { margin-left: auto; width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: grid; place-items: center; color: transparent; flex-shrink: 0; }
.opt.on .o-check { background: var(--primary); border-color: var(--primary); color: #fff; }
.opt .o-check svg { width: 12px; height: 12px; }

/* ---------- Splash ---------- */
#splash {
  position: fixed; inset: 0; z-index: 1000;
  background: #060b14;
  display: grid; place-items: center;
  transition: opacity .45s var(--ease), visibility .45s;
}
#splash.hide { opacity: 0; visibility: hidden; }
#splash .s-logo {
  width: 96px; height: 96px; border-radius: 30px;
  background: linear-gradient(135deg, #10b981, #0d9488);
  display: grid; place-items: center;
  box-shadow: 0 20px 60px rgba(16,185,129,.5);
  animation: splash-pop .7s var(--spring);
}
#splash .s-logo svg { width: 52px; height: 52px; color: #fff; }
@keyframes splash-pop { from { transform: scale(.6); opacity: 0; } }

/* ---------- Utility ---------- */
.stagger > * { animation: page-in var(--dur-3) var(--ease) both; }
.stagger > *:nth-child(1) { animation-delay: .02s; }
.stagger > *:nth-child(2) { animation-delay: .06s; }
.stagger > *:nth-child(3) { animation-delay: .1s; }
.stagger > *:nth-child(4) { animation-delay: .14s; }
.stagger > *:nth-child(5) { animation-delay: .18s; }
.stagger > *:nth-child(6) { animation-delay: .22s; }
.empty-state { text-align: center; padding: 44px 20px; color: var(--text-3); }
.empty-state svg { width: 44px; height: 44px; margin: 0 auto 12px; opacity: .5; }
.empty-state p { font-weight: 700; font-size: .92rem; }
.muted { color: var(--text-3); font-size: .8rem; }
.row { display: flex; align-items: center; gap: 12px; }
.spacer { flex: 1; }
.mt-1 { margin-top: 8px; } .mt-2 { margin-top: 14px; } .mt-3 { margin-top: 22px; }
.center { text-align: center; }

/* fav heart pulse */
@keyframes heart-pop { 0% { transform: scale(1); } 40% { transform: scale(1.35); } 100% { transform: scale(1); } }
.heart-pop { animation: heart-pop .4s var(--spring); }

/* ---------- Desktop ---------- */
@media (min-width: 640px) {
  body { padding: 0 16px; }
  #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
}

/* ---------- Accessibility ---------- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
}
@media (prefers-contrast: more) {
  :root { --border: rgba(255,255,255,.3); --text-2: rgba(240,246,252,.85); }
  [data-theme="light"] { --border: rgba(10,30,25,.35); --text-2: rgba(11,22,34,.85); }
}

const store = {
  get(k, d = null) { try { const v = localStorage.getItem('vakti:' + k); return v === null ? d : JSON.parse(v); } catch { return d; } },
  set(k, v) { try { localStorage.setItem('vakti:' + k, JSON.stringify(v)); } catch {} },
  del(k) { localStorage.removeItem('vakti:' + k); },
  all() {
    const o = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith('vakti:')) o[k.slice(6)] = JSON.parse(localStorage.getItem(k));
    }
    return o;
  }
};

const pad = n => String(n).padStart(2, '0');

function sheet(html, onOpen) {
  const scrim = document.createElement('div');
  scrim.className = 'sheet-scrim';
  const sh = document.createElement('div');
  sh.className = 'sheet'; sh.setAttribute('role', 'dialog'); sh.setAttribute('aria-modal', 'true');
  sh.innerHTML = `<div class="sheet-handle"></div>` + html;
  const close = () => {
    scrim.classList.add('closing'); sh.classList.add('closing');
    setTimeout(() => { scrim.remove(); sh.remove(); }, 300);
  };
  scrim.onclick = close;
  document.body.append(scrim, sh);
  onOpen && onOpen(sh, close);
  return close;
}

/* ---------- Motori i Takvimit (BIK) ---------- */
const Prayer = {
  dayIndex(d) {
    const ref = new Date(2026, d.getMonth(), d.getDate() === 29 && d.getMonth() === 1 ? 28 : d.getDate());
    return Math.round((ref - new Date(2026, 0, 1)) / 864e5);
  },
  times(d = new Date(), cityOff = S.city.off) {
    const dst = d.getTimezoneOffset() < new Date(d.getFullYear(), 0, 1).getTimezoneOffset() ? 60 : 0;
    return TAKVIMI[this.dayIndex(d)].map(v => v + cityOff + dst);
  },
  nowMin() { const n = new Date(); return n.getHours() * 60 + n.getMinutes() + n.getSeconds() / 60; },
  /** Namazi i radhës: {idx, name, min, isTomorrow, prevMin} */
  next() {
    const t = this.times(), now = this.nowMin();
    for (let i = 0; i < 7; i++) {
      if (t[i] > now) return { idx: i, name: PRAYER_NAMES[i], min: t[i], isTomorrow: false, prevMin: i ? t[i - 1] : t[0] - 60 };
    }
    const tom = new Date(Date.now() + 864e5);
    return { idx: 0, name: PRAYER_NAMES[0], min: this.times(tom)[0] + 1440, isTomorrow: true, prevMin: t[6] };
  },
  countdown(targetMin) {
    const secs = Math.max(0, Math.round((targetMin - this.nowMin()) * 60));
    return `${pad(Math.floor(secs / 3600))}:${pad(Math.floor(secs / 60) % 60)}:${pad(secs % 60)}`;
  }
};

function hijriDate(d = new Date()) {
  try {
    const f = new Intl.DateTimeFormat('sq-AL-u-ca-islamic-umalqura', { day: 'numeric', month: 'long', year: 'numeric' });
    return f.format(d).replace(/\b(AH|H)\b\.?/g, 'H');
  } catch { return ''; }
}

/* ---------- Statistikat ---------- */
function stats() {
  const log = S.prayerLog;
  let total = 0, fullDays = 0;
  Object.values(log).forEach(day => {
    const c = day.filter(Boolean).length;
    total += c; if (c === 5) fullDays++;
  });
  // seritë
  let streak = 0, best = 0, d = new Date();
  const hasAny = iso => (log[iso] || []).some(Boolean);
  if (!hasAny(todayISO(d))) d = new Date(Date.now() - 864e5);
  while (hasAny(todayISO(d))) { streak++; d = new Date(d - 864e5); }
  const days = Object.keys(log).filter(hasAny).sort();
  let run = 0, prev = null;
  for (const iso of days) {
    run = (prev && (new Date(iso) - new Date(prev)) === 864e5) ? run + 1 : 1;
    best = Math.max(best, run); prev = iso;
  }
  best = Math.max(best, streak);
  return {
    totalPrayers: total, fullDays, streak, bestStreak: best,
    surahsRead: S.readSurahs.length,
    favorites: S.favAyat.length + S.favDuas.length + S.favLectures.length,
    duasRead: S.duasRead.length,
  };
}

/* ---------- Njoftimet ---------- */
let notifTimer = null;
function scheduleNotifications() {
  clearTimeout(notifTimer);
  if (!S.notif || !('Notification' in window) || Notification.permission !== 'granted') return;
  const t = Prayer.times(), now = Prayer.nowMin();
  for (const i of FARD_INDEXES) {
    if (t[i] > now) {
      notifTimer = setTimeout(() => {
        try { new Notification('Vakti — ' + PRAYER_NAMES[i], { body: `Hyri koha e namazit — ${PRAYER_NAMES[i]} (${fmtMin(t[i])}).`, icon: 'assets/icons/icon-192.png', badge: 'assets/icons/icon-192.png' }); } catch {}
        scheduleNotifications();
      }, Math.min((t[i] - now) * 60000, 2147000000));
      return;
    }
  }
}

/* ---------- Cache i Kuranit ---------- */
const QURAN_CACHE = 'vakti-quran-v1';
async function fetchSurah(n) {
  const url = `https://api.alquran.cloud/v1/surah/${n}/editions/quran-uthmani,sq.nahi`;
  try {
    const cache = await caches.open(QURAN_CACHE);
    const hit = await cache.match(url);
    if (hit) return (await hit.json()).data;
    const res = await fetch(url);
    if (!res.ok) throw 0;
    await cache.put(url, res.clone());
    return (await res.json()).data;
  } catch {
    const res = await fetch(url); // përpjekje pa cache API (p.sh. HTTP)
    if (!res.ok) throw new Error('offline');
    return (await res.json()).data;
  }
}

function toggleFard(i) {
  const iso = todayISO();
  const log = { ...S.prayerLog };
  const day = log[iso] ? [...log[iso]] : [false, false, false, false, false];
  day[i] = !day[i]; log[iso] = day;
  store.set('prayerLog', log);
  if (day[i]) { navigator.vibrate?.(18); toast(`${FARD_NAMES[i]} u shënua ✓`); checkAchievements(); }
  route(); // rifresko
}

function checkAchievements() {
  const st = stats();
  const earned = store.get('achievements', []);
  let news = false;
  ACHIEVEMENTS.forEach(a => {
    if (!earned.includes(a.id) && a.check(st)) { earned.push(a.id); news = true; setTimeout(() => toast(`${a.icon} Arritje e re: ${a.name}!`, 'trophy'), 800); }
  });
  if (news) store.set('achievements', earned);
}

async function screenSure(n) {
  n = Math.min(114, Math.max(1, +n || 1));
  const [name, ayahCount, place] = SURAHS[n - 1];
  render(`
    <header class="page-head">${backBtn('#/kurani')}<h2>${esc(name)}</h2></header>
    <div class="surah-head">
      <p class="s-ar" lang="ar" id="s-ar-name"></p>
      <h3 class="s-name">${esc(name)}</h3>
      <p class="s-meta">Surja ${n} · ${ayahCount} ajete · ${place === 'M' ? 'Mekase' : 'Medinase'}</p>
    </div>
    <div id="ayah-wrap">
      ${Array.from({ length: 4 }, () => '<div class="skeleton" style="height:130px;margin-bottom:12px"></div>').join('')}
    </div>
  `, { tab: '#/kurani' });

  // shëno si të lexuar + pozicioni
  if (!S.readSurahs.includes(n)) { store.set('readSurahs', [...S.readSurahs, n]); checkAchievements(); }

  try {
    const data = await fetchSurah(n);
    const wrap = $('#ayah-wrap'); if (!wrap) return;
    const [ar, sq] = data;
    const arName = $('#s-ar-name'); if (arName) arName.textContent = ar.name;
    const favs = new Set(S.favAyat.map(f => `${f.s}:${f.a}`));
    wrap.innerHTML = (n !== 1 && n !== 9 ? `<p class="bismillah" lang="ar">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>` : '') +
      ar.ayahs.map((a, i) => {
        let text = a.text;
        if (i === 0 && n !== 1 && n !== 9) text = text.replace(/^بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ\s*/, '');
        const key = `${n}:${a.numberInSurah}`;
        return `<article class="ayah-card" id="ayah-${a.numberInSurah}">
          <div class="ayah-top">
            <span class="ayah-num">${a.numberInSurah}</span>
            <div class="ayah-actions">
              <button data-fav="${key}" class="${favs.has(key) ? 'on' : ''}" aria-label="Shto në të preferuara" aria-pressed="${favs.has(key)}">${favs.has(key) ? ICONS.starFill : ICONS.star}</button>
              <button data-mark="${a.numberInSurah}" aria-label="Ruaj pozicionin e leximit">${ICONS.book}</button>
              <button data-share="${key}" aria-label="Ndaj ajetin">${ICONS.share}</button>
            </div>
          </div>
          <p class="ayah-ar" lang="ar">${esc(text)}</p>
          <p class="ayah-sq">${esc(sq.ayahs[i]?.text || '')}</p>
        </article>`;
      }).join('');

    store.set('quranPos', { s: n, a: 1 });

    wrap.querySelectorAll('[data-fav]').forEach(b => b.onclick = () => {
      const [s, a] = b.dataset.fav.split(':').map(Number);
      let favs = S.favAyat;
      const has = favs.some(f => f.s === s && f.a === a);
      favs = has ? favs.filter(f => !(f.s === s && f.a === a)) : [...favs, { s, a }];
      store.set('favAyat', favs);
      b.classList.toggle('on', !has); b.innerHTML = has ? ICONS.star : ICONS.starFill;
      b.classList.add('heart-pop'); setTimeout(() => b.classList.remove('heart-pop'), 450);
      if (!has) checkAchievements();
    });
    wrap.querySelectorAll('[data-mark]').forEach(b => b.onclick = () => {
      store.set('quranPos', { s: n, a: +b.dataset.mark });
      toast(`Pozicioni u ruajt: ajeti ${b.dataset.mark}`);
    });
    wrap.querySelectorAll('[data-share]').forEach(b => b.onclick = async () => {
      const [s, a] = b.dataset.share.split(':').map(Number);
      const i = a - 1;
      const text = `${sq.ayahs[i]?.text}\n— Kurani, ${name} ${s}:${a}\n(via Vakti)`;
      if (navigator.share) { try { await navigator.share({ text }); } catch {} }
      else { await navigator.clipboard?.writeText(text); toast('U kopjua në clipboard'); }
    });

    // shko tek pozicioni i ruajtur
    const saved = S.quranPos;
    if (saved && saved.s === n && saved.a > 1) {
      const el = document.getElementById('ayah-' + saved.a);
      if (el) { el.scrollIntoView({ block: 'center' }); el.classList.add('highlight'); }
    }
  } catch {
    const wrap = $('#ayah-wrap');
    if (wrap) wrap.innerHTML = `<div class="empty-state">${ICONS.cloud}<p>S'ka lidhje interneti.<br>Suret e lexuara më parë janë të ruajtura offline.</p>
      <button class="btn btn-sm mt-2" onclick="location.reload()">Provo përsëri</button></div>`;
  }
}

/* ---------- KIBLA ---------- */
let kiblaCleanup = null;
function screenKibla() {
  kiblaCleanup?.();
  render(`
    <header class="page-head">${backBtn('#/')}<h2>Kibla</h2></header>
    <div class="compass-wrap">
      <div class="compass" id="compass">
        <div class="compass-dial" id="dial">
          <div class="kaaba-marker">🕋</div>
          ${[0, 45, 90, 135, 180, 225, 270, 315].map(a => `<span style="position:absolute;top:50%;left:50%;transform:rotate(${a}deg) translateY(calc(min(39vw,160px) * -0.82)) ;font-size:.65rem;font-weight:800;color:var(--text-3)">${{ 0: 'V', 90: 'L', 180: 'J', 270: 'P' }[a] ?? '·'}</span>`).join('')}
        </div>
        <div class="compass-center"><p class="deg" id="deg">--°</p><p class="lbl" id="deg-lbl">Drejtimi i Kiblës</p></div>
      </div>
    </div>
    <div class="card center" id="kibla-info">
      <p class="muted">Kibla nga Kosova është rreth <b style="color:var(--text)">136°</b> (juglindje).</p>
      <button class="btn btn-primary mt-2" id="kibla-start">${ICONS.compass} Aktivizo busullën</button>
      <p class="muted mt-2" style="font-size:.72rem">Për saktësi maksimale, mbaje telefonin horizontalisht dhe lëvize në formë 8-she për kalibrim.</p>
    </div>
  `, { tab: null });

  const KAABA = { lat: 21.4225, lng: 39.8262 };
  let qibla = 136; // vlera për Kosovën si parazgjedhje
  let heading = null;

  const bearing = (lat, lng) => {
    const toR = x => x * Math.PI / 180;
    const dL = toR(KAABA.lng - lng);
    const y = Math.sin(dL) * Math.cos(toR(KAABA.lat));
    const x = Math.cos(toR(lat)) * Math.sin(toR(KAABA.lat)) - Math.sin(toR(lat)) * Math.cos(toR(KAABA.lat)) * Math.cos(dL);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  };

  navigator.geolocation?.getCurrentPosition(p => {
    qibla = bearing(p.coords.latitude, p.coords.longitude);
    if (heading === null) { const d = $('#deg'); if (d) d.textContent = Math.round(qibla) + '°'; }
  }, () => {}, { timeout: 5000 });

  const onOrient = e => {
    let h = e.webkitCompassHeading ?? (e.absolute || e.alpha !== null ? 360 - e.alpha : null);
    if (h === null || isNaN(h)) return;
    heading = h;
    const rot = qibla - h;
    const dial = $('#dial'); if (!dial) return;
    dial.style.transform = `rotate(${rot}deg)`;
    const diff = Math.abs(((rot % 360) + 360) % 360);
    const aligned = diff < 4 || diff > 356;
    $('#compass').classList.toggle('aligned', aligned);
    $('#deg').textContent = Math.round(((qibla - h) % 360 + 360) % 360) + '°';
    $('#deg-lbl').textContent = aligned ? '✓ Drejt Kiblës!' : 'Rrotullohu drejt 0°';
    if (aligned && !dial.dataset.buzzed) { navigator.vibrate?.(60); dial.dataset.buzzed = '1'; }
    if (!aligned) delete dial.dataset.buzzed;
  };

  $('#kibla-start').onclick = async () => {
    try {
      if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
        if (await DeviceOrientationEvent.requestPermission() !== 'granted') { toast('Leja u refuzua', 'x'); return; }
      }
      window.addEventListener('deviceorientationabsolute', onOrient);
      window.addEventListener('deviceorientation', onOrient);
      $('#kibla-start').textContent = 'Busulla aktive';
      $('#kibla-start').disabled = true;
    } catch { toast('Busulla nuk mbështetet në këtë pajisje', 'x'); }
  };
  kiblaCleanup = () => {
    window.removeEventListener('deviceorientationabsolute', onOrient);
    window.removeEventListener('deviceorientation', onOrient);
  };
}

  let cat = '', q = '';

    const favs = new Set(S.favLectures);

    let items = LECTURES.map((l, i) => ({ ...l, i }));
    if (cat === '__fav') items = items.filter(l => favs.has(l.i));
    else if (cat === '__recent') items = recent.map(i => items[i]).filter(Boolean);
    else if (cat) items = items.filter(l => l.cat === cat);
    if (q) items = items.filter(l => l.t.toLowerCase().includes(q) || l.hoxha.toLowerCase().includes(q));

    $('#lec-list').innerHTML = items.map(l => `
      <button class="video-card" data-play="${l.i}">

          <img src="https://i.ytimg.com/vi/${l.yt}/hqdefault.jpg" alt="" loading="lazy">

        <div class="video-body">

          <span style="color:${favs.has(l.i) ? 'var(--danger)' : 'var(--text-3)'}" data-favlec="${l.i}" role="button" aria-label="E preferuar">${favs.has(l.i) ? ICONS.heartFill : ICONS.heart}</span>
        </div>
      </button>`).join('') || `<div class="empty-state">${ICONS.video}<p>Asnjë ligjëratë nuk u gjet</p></div>`;

    $('#lec-list').querySelectorAll('[data-play]').forEach(card => card.onclick = e => {
      const favEl = e.target.closest('[data-favlec]');
      const i = +card.dataset.play;
      if (favEl) {
        e.stopPropagation();
        let f = S.favLectures;
        f = f.includes(i) ? f.filter(x => x !== i) : [...f, i];
        store.set('favLectures', f); checkAchievements(); draw();
        return;
      }
      playLecture(i);
    });
  };
  draw();
  $('#lec-q').oninput = e => { q = e.target.value.trim().toLowerCase(); draw(); };
  document.querySelectorAll('#lec-chips .chip').forEach(c => c.onclick = () => {
    document.querySelectorAll('#lec-chips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on'); cat = c.dataset.cat; draw();
  });
}

function playLecture(i) {
  const l = LECTURES[i];
  const recent = [i, ...S.recentLectures.filter(x => x !== i)].slice(0, 10);

/* ---------- KALENDARI ISLAM ---------- */
function screenKalendari(offset = 0) {
  const now = new Date();
  const view = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const monthName = view.toLocaleDateString('sq-AL', { month: 'long', year: 'numeric' });
  const daysInMonth = new Date(view.getFullYear(), view.getMonth() + 1, 0).getDate();
  const firstDow = (view.getDay() + 6) % 7; // e hëna = 0
  const evMap = {};
  ISLAMIC_EVENTS.forEach(e => evMap[e.date] = e);
  let hijriDay;
  try { hijriDay = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', { day: 'numeric' }); } catch { hijriDay = null; }

  let cells = '';
  for (let i = 0; i < firstDow; i++) cells += `<span class="cal-day other"></span>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(view.getFullYear(), view.getMonth(), d);
    const iso = todayISO(date);
    const isToday = iso === todayISO();
    cells += `<span class="cal-day ${isToday ? 'today' : ''} ${evMap[iso] ? 'event' : ''}" ${evMap[iso] ? `title="${esc(evMap[iso].name)}"` : ''}>
      ${d}<span class="hij">${hijriDay ? hijriDay.format(date) : ''}</span></span>`;
  }
  const upcoming = ISLAMIC_EVENTS.filter(e => new Date(e.date) >= new Date(todayISO())).slice(0, 6);

  render(`
    <header class="page-head">${backBtn('#/')}<h2>Kalendari Islam</h2></header>
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:14px">
        <button class="icon-btn" id="cal-prev" aria-label="Muaji i kaluar">${ICONS.back}</button>
        <b style="text-transform:capitalize">${esc(monthName)}</b>
        <button class="icon-btn" id="cal-next" aria-label="Muaji i ardhshëm">${ICONS.chevR}</button>
      </div>
      <p class="muted center" style="margin-bottom:12px">${esc(hijriDate(view))} — ${esc(hijriDate(new Date(view.getFullYear(), view.getMonth(), daysInMonth)))}</p>
      <div class="cal-grid">
        ${['Hën', 'Mar', 'Mër', 'Enj', 'Pre', 'Sht', 'Die'].map(d => `<span class="cal-dow">${d}</span>`).join('')}
        ${cells}
      </div>
    </div>
    <section class="section">
      <div class="section-head"><h3>Festat dhe netët e mëdha</h3></div>
      <div class="stagger">
        ${upcoming.map(e => `<div class="list-item">
          <span class="li-icon" style="color:var(--gold)">${ICONS.star}</span>
          <span class="li-body"><span class="li-title">${esc(e.name)}</span><span class="li-sub">${esc(e.desc)}</span></span>
          <span class="li-end">${new Date(e.date).toLocaleDateString('sq-AL', { day: 'numeric', month: 'short' })}</span>
        </div>`).join('')}
      </div>
    </section>
  `, { tab: null });
  $('#cal-prev').onclick = () => screenKalendari(offset - 1);
  $('#cal-next').onclick = () => screenKalendari(offset + 1);
}

/* ---------- XHAMIA MË E AFËRT ---------- */
function screenXhamia() {
  render(`
    <header class="page-head">${backBtn('#/')}<h2>Xhamia më e Afërt</h2></header>
    <div id="mosque-wrap">
      <div class="card center">
        <p class="muted">Gjej xhamitë përreth teje me GPS.</p>
        <button class="btn btn-primary mt-2" id="mosque-find">${ICONS.map} Gjej xhamitë</button>
      </div>
    </div>
  `, { tab: null });

  $('#mosque-find').onclick = () => {
    const wrap = $('#mosque-wrap');
    wrap.innerHTML = Array.from({ length: 3 }, () => '<div class="skeleton" style="height:76px;margin-bottom:10px"></div>').join('');
    navigator.geolocation.getCurrentPosition(async p => {
      const { latitude: lat, longitude: lng } = p.coords;
      try {
        const q = `[out:json][timeout:12];(node["amenity"="place_of_worship"]["religion"="muslim"](around:5000,${lat},${lng});way["amenity"="place_of_worship"]["religion"="muslim"](around:5000,${lat},${lng}););out center 20;`;
        const res = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: 'data=' + encodeURIComponent(q) });
        if (!res.ok) throw 0;
        const json = await res.json();
        const dist = (la, lo) => {
          const R = 6371, dLa = (la - lat) * Math.PI / 180, dLo = (lo - lng) * Math.PI / 180;
          const a = Math.sin(dLa / 2) ** 2 + Math.cos(lat * Math.PI / 180) * Math.cos(la * Math.PI / 180) * Math.sin(dLo / 2) ** 2;
          return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };
        const mosques = json.elements.map(e => {
          const la = e.lat ?? e.center?.lat, lo = e.lon ?? e.center?.lon;
          return { name: e.tags?.name || 'Xhami', la, lo, d: dist(la, lo), addr: [e.tags?.['addr:street'], e.tags?.['addr:city']].filter(Boolean).join(', ') };
        }).filter(m => m.la).sort((a, b) => a.d - b.d).slice(0, 12);

        if (!mosques.length) throw 0;
        wrap.innerHTML = `<div class="stagger">` + mosques.map(m => `
          <a class="list-item" href="https://www.google.com/maps/dir/?api=1&destination=${m.la},${m.lo}&travelmode=walking" target="_blank" rel="noopener">
            <span class="li-icon">${ICONS.mosque}</span>
            <span class="li-body"><span class="li-title">${esc(m.name)}</span>
            <span class="li-sub">${m.addr ? esc(m.addr) + ' · ' : ''}~${Math.round(m.d * 12)} min në këmbë</span></span>
            <span class="li-end">${m.d < 1 ? Math.round(m.d * 1000) + ' m' : m.d.toFixed(1) + ' km'} ${ICONS.chevR}</span>
          </a>`).join('') + `</div>
          <p class="muted center mt-2" style="font-size:.72rem">Të dhënat nga OpenStreetMap. Struktura është gati për programet, imamët dhe njoftimet e xhamive.</p>`;
      } catch {
        wrap.innerHTML = `<div class="card center">
          <p class="muted">Lista nuk u ngarkua dot. Hape direkt në hartë:</p>
          <a class="btn btn-primary mt-2" href="https://www.google.com/maps/search/xhamia/@${lat},${lng},14z" target="_blank" rel="noopener">${ICONS.map} Xhamitë në hartë</a></div>`;
      }
    }, () => {
      $('#mosque-wrap').innerHTML = `<div class="card center"><p class="muted">Qasja në lokacion u refuzua. Aktivizoje GPS-in dhe lejën e lokacionit për këtë faqe.</p></div>`;
    }, { enableHighAccuracy: true, timeout: 10000 });
  };
}

    store.set('notif', e.target.checked); scheduleNotifications();
    toast(e.target.checked ? 'Njoftimet u aktivizuan' : 'Njoftimet u çaktivizuan');
  };
  $('#set-backup').onclick = () => {
    const blob = new Blob([JSON.stringify({ app: 'vakti', version: 1, date: todayISO(), data: store.all() }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = `vakti-backup-${todayISO()}.json`; a.click();
    URL.revokeObjectURL(a.href); toast('Kopja u shkarkua');
  };
  $('#set-restore').onclick = () => $('#restore-file').click();
  $('#restore-file').onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const j = JSON.parse(r.result);
        if (j.app !== 'vakti') throw 0;
        Object.entries(j.data).forEach(([k, v]) => store.set(k, v));
        applyTheme(); applyFontSize(); toast('Të dhënat u rikthyen'); route();
      } catch { toast('Skedar i pavlefshëm', 'x'); }
    };
    r.readAsText(f);
  };
  $('#set-reset').onclick = () => {
    if (confirm('A je i sigurt? Të gjitha të dhënat do të fshihen përgjithmonë.')) {
      Object.keys(store.all()).forEach(k => store.del(k));
      location.hash = '#/'; location.reload();
    }
  };
}

/* ---------- ONBOARDING ---------- */
function showOnboarding() {
  let step = 0;
  const picks = { city: 'prishtine', theme: 'dark', name: '' };
  const ob = document.createElement('div');
  ob.className = 'onboard';
  document.body.appendChild(ob);

  const steps = [
    () => `
      <div class="onboard-body">
        <div class="onboard-logo">${ICONS.logo}</div>
        <h1>Es-selamu alejkum!<br>Mirë se vjen në <span style="color:var(--primary)">Vakti</span>.</h1>
        <p class="lead">Platforma islame më moderne për Kosovën — kohët e namazit sipas Takvimit zyrtar të BIK-ut, Kurani, lutjet, Kibla dhe shumë më tepër. Gjithçka offline, gjithçka private.</p>
      </div>
      <button class="btn btn-primary" data-next>Fillojmë ${ICONS.chevR}</button>`,
    () => `
      <div class="onboard-body">
        <h1>Ku ndodhesh?</h1>
        <p class="lead">Kohët e namazit përshtaten saktë sipas qytetit tënd.</p>
        <div class="opt-list">
          ${CITIES.map(c => `<button class="opt ${c.id === picks.city ? 'on' : ''}" data-city="${c.id}">${esc(c.name)}<span class="o-check">${ICONS.check}</span></button>`).join('')}
        </div>
      </div>
      <button class="btn btn-primary" data-next>Vazhdo ${ICONS.chevR}</button>`,
    () => `
      <div class="onboard-body">
        <h1>Zgjedh pamjen.</h1>
        <p class="lead">Mund ta ndryshosh kurdo te Cilësimet.</p>
        <div class="opt-list">
          ${[['dark', '🌙 E errët', 'Elegante dhe e qetë'], ['light', '☀️ E çelët', 'E pastër dhe e ndritshme'], ['oled', '⬛ OLED', 'E zezë absolute — kursen baterinë'], ['auto', '✨ Automatike', 'Ndjek sistemin']].map(([v, t, s]) =>
            `<button class="opt ${picks.theme === v ? 'on' : ''}" data-theme="${v}"><span><b>${t}</b><br><small class="muted">${s}</small></span><span class="o-check">${ICONS.check}</span></button>`).join('')}
        </div>
      </div>
      <button class="btn btn-primary" data-next>Vazhdo ${ICONS.chevR}</button>`,
    () => `
      <div class="onboard-body">
        <h1>Si të thërrasim?</h1>
        <p class="lead">Profili ruhet vetëm në pajisjen tënde. Llogaritë me Email, Google dhe Apple vijnë së shpejti.</p>
        <div class="field mt-3"><input class="input" id="ob-name" placeholder="Emri yt (opsionale)" value="${esc(picks.name)}"></div>
      </div>
      <button class="btn btn-primary" data-finish>Përfundo ${ICONS.check}</button>
      <button class="btn btn-ghost" data-finish style="width:100%;margin-top:8px">Vazhdo si mysafir</button>`,
  ];

  const draw = () => {
    ob.innerHTML = `<div class="onboard-dots">${steps.map((_, i) => `<i class="${i <= step ? 'on' : ''}"></i>`).join('')}</div>` + steps[step]();
    ob.querySelectorAll('[data-city]').forEach(b => b.onclick = () => { picks.city = b.dataset.city; draw(); });
    ob.querySelectorAll('[data-theme]').forEach(b => b.onclick = () => { picks.theme = b.dataset.theme; store.set('theme', picks.theme); applyTheme(); draw(); });
    ob.querySelector('[data-next]')?.addEventListener('click', () => { step++; draw(); });
    ob.querySelectorAll('[data-finish]').forEach(b => b.onclick = () => {
      picks.name = ob.querySelector('#ob-name')?.value.trim() || '';
      store.set('city', picks.city); store.set('theme', picks.theme); store.set('name', picks.name);
      store.set('onboarded', true);
      ob.style.transition = 'opacity .4s'; ob.style.opacity = '0';
      setTimeout(() => ob.remove(), 400);
      route();
    });
  };
  draw();
}

/* ---------- ROUTER ---------- */
const routes = {
  '': screenHome, '#/': screenHome,
  '#/kohet': screenKohet,
  '#/kurani': screenKurani,
  '#/lutjet': screenLutjet,
  '#/kibla': screenKibla,
  '#/ligjeratat': screenLigjeratat,
  '#/kalendari': () => screenKalendari(0),
  '#/xhamia': screenXhamia,
  '#/kerko': screenKerko,
  '#/profili': screenProfili,
  '#/me-shume': screenMeShume,
  '#/settings': screenSettings,
};
function route() {
  clearInterval(heroInterval); clearInterval(kohetInterval); kiblaCleanup?.();
  const h = location.hash;
  const sure = h.match(/^#\/sure\/(\d+)$/);
  if (sure) return screenSure(+sure[1]);
  (routes[h] || screenHome)();
}

/* ---------- Nisja ---------- */
function init() {
  applyTheme(); applyFontSize();
  matchMedia('(prefers-color-scheme: light)').addEventListener?.('change', () => S.theme === 'auto' && applyTheme());

  // Tab bar
  const nav = document.createElement('nav');
  nav.className = 'tab-bar'; nav.setAttribute('aria-label', 'Navigimi kryesor');
  nav.innerHTML = [
    ['#/', 'home', 'Ballina'], ['#/kohet', 'clock', 'Kohët'], ['#/kurani', 'book', 'Kurani'],
    ['#/lutjet2', 'dua', 'Lutjet'], ['#/me-shume', 'grid', 'Më shumë']
  ].map(([r, ic, l]) => `<button class="tab" data-route="${r === '#/lutjet2' ? '#/lutjet' : r}" aria-label="${l}">${ICONS[ic]}<span>${l}</span></button>`).join('');
  nav.querySelectorAll('.tab').forEach(t => t.onclick = () => { location.hash = t.dataset.route; });
  document.body.appendChild(nav);

  window.addEventListener('hashchange', route);
  route();

  if (!S.onboarded) showOnboarding();

  // Service Worker
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        w?.addEventListener('statechange', () => {
          if (w.state === 'installed' && navigator.serviceWorker.controller) toast('Përditësim i ri — rihape aplikacionin');
        });
      });
    }).catch(() => {});
  }

  // Install prompt
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    if (store.get('installDismissed')) return;
    setTimeout(() => {
      if (!deferredPrompt) return;
      sheet(`<h3>Instalo Vaktin 📲</h3>
        <p class="muted" style="margin-bottom:16px">Shtoje në ekranin kryesor për qasje të shpejtë dhe përvojë të plotë offline.</p>
        <button class="btn btn-primary" id="pwa-install">Instalo tani</button>
        <button class="btn btn-ghost" id="pwa-later" style="width:100%;margin-top:8px">Më vonë</button>`,
        (sh, close) => {
          sh.querySelector('#pwa-install').onclick = async () => { close(); deferredPrompt.prompt(); deferredPrompt = null; };
          sh.querySelector('#pwa-later').onclick = () => { store.set('installDismissed', true); close(); };
        });
    }, 20000);
  });

  scheduleNotifications();
  document.addEventListener('visibilitychange', () => !document.hidden && scheduleNotifications());

  // Splash
  setTimeout(() => $('#splash')?.classList.add('hide'), 500);
  setTimeout(() => $('#splash')?.remove(), 1100);
}

init();


  </script>
